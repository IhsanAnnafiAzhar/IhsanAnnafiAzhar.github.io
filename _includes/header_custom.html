<button class="btn js-toggle-dark-mode">Terang</button>

<script>
const toggleDarkMode = document.querySelector('.js-toggle-dark-mode');

jtd.addEvent(toggleDarkMode, 'click', function(){
  if (jtd.getTheme() === 'dark') {
    jtd.setTheme('light');
    toggleDarkMode.textContent = 'Terang';
  } else {
    jtd.setTheme('dark');
    toggleDarkMode.textContent = 'Gelap';
  }
});
</script>
